[theme]
primaryColor = "#33503F"
backgroundColor = "#F4F1E8"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1E2A22"
font = "sans serif"

[server]
headless = true

[client]
# Hide the Streamlit "Deploy"/hamburger dev menu so it reads as a finished app.
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
